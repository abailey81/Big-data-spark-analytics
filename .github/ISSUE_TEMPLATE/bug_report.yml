name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Task 1 Batch (NYC Taxi)
        - Task 2 Blockchain (Ethereum)
        - Task 3 Graph Analytics
        - Task 4 Streaming (NASA)
        - Infrastructure
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      render: shell
