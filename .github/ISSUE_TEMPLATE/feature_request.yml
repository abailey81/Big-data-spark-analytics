name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Task 1 Batch (NYC Taxi)
        - Task 2 Blockchain (Ethereum)
        - Task 3 Graph Analytics
        - Task 4 Streaming (NASA)
        - Infrastructure
        - Other
    validations:
      required: true
